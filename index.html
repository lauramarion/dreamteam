<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectures de la Dream Team 2026</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Mulish:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <header class="site-header">
    <div class="header-left">
      <h1>Lectures de la <em>Dream Team</em></h1>
      <p>Inventaire des lectures 2026</p>
    </div>
    <div class="header-right">
      <span class="update-tag" id="updateTag">Chargement…</span>
      <button class="btn-refresh" id="refreshBtn" onclick="loadData()">↻ Actualiser</button>
    </div>
  </header>

  <div id="tooltip" class="tooltip"></div>
  <div id="app"></div>

  <footer>
    <span>Dream Team Reads <span style="color:var(--navy-mid);font-weight:700">2026</span></span>
    <span id="footerStats"></span>
  </footer>

  <script>
    const READERS = ['Emiline', 'Emilie', 'Julie', 'Laura M', 'Laura V', 'Zoé'];
    const COLORS = { 'Emiline': '#ca8a04', 'Zoé': '#7c3aed', 'Laura V': '#16a34a', 'Laura M': '#1d4ed8', 'Julie': '#db2777', 'Emilie': '#0891b2' };
    const EMOJI = { 'Emiline': '🌸', 'Zoé': '✨', 'Laura V': '🌿', 'Laura M': '📖', 'Julie': '🌺', 'Emilie': '🦋' };
    const MONTHS = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
    const MSHORT = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];

    const GC = { 'BD': '#1a2f5e', 'Roman graphique': '#2a4480', 'Manga': '#1e40af', 'Romance': '#e85d3a', 'Romantasy': '#d4820a', '(Auto-)biographie': '#0891b2', 'Littérature contemporaine': '#0e7490', 'Fantasy': '#059669', 'Jeunesse': '#7c3aed', 'Essai': '#6b7fa8', 'Nouvelles': '#94a3b8', 'Thriller': '#c4512e', 'Littérature historique': '#78716c', 'Webtoon': '#db2777', 'SF': '#2563eb' };
    const GE = { 'BD': '📕', 'Roman graphique': '📗', 'Romance': '💕', 'Romantasy': '🐉', '(Auto-)biographie': '📔', 'Fantasy': '⚔️', 'Jeunesse': '🌟', 'Essai': '📝', 'Nouvelles': '📄', 'Thriller': '🔪', 'Littérature contemporaine': '📖', 'Manga': '🎌' };
    const gc = g => GC[g] || '#94a3b8';
    const ge = g => GE[g] || '📚';

    const BOOKS = [];
    const GOALS = {};

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztvz-9q7dHG5ZoVv0DrULCQrLvKEbAHzbsEeCsW58HHVTEvtISDEdyaekRQXG_NoB6/exec';

    function loadData() {
      const btn = document.getElementById('refreshBtn');
      const tag = document.getElementById('updateTag');
      btn.classList.add('loading');
      tag.textContent = 'Chargement…';

      fetch(APPS_SCRIPT_URL)
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
          const books = data.books || [];
          const goals = data.goals || {};
          const gen = data.generated || new Date().toISOString();
          const d = new Date(gen);
          const label = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
          tag.textContent = 'Données au ' + label;
          btn.classList.remove('loading');
          render(books, goals, gen);
        })
        .catch(err => {
          console.error('Erreur de chargement:', err);
          tag.textContent = 'Erreur de chargement ⚠️';
          btn.classList.remove('loading');
        });
    }

    function render(books, goals, gen) {
      // Normalize: pagesLues >= pagesTotales > 0 means the book is finished
      books.forEach(b => {
        if (!b.fini && b.pagesTotales > 0 && b.pagesLues >= b.pagesTotales) b.fini = true;
      });
      const fin = books.filter(b => b.fini);
      const app = document.getElementById('app');
      app.innerHTML = '';
      const main = mk('main');
      main.appendChild(secStats(fin));
      main.appendChild(secDernieres(books));
      main.appendChild(secReaders(fin, goals));
      main.appendChild(secGenres(fin));
      main.appendChild(secAnalyses(books));
      main.appendChild(secFormats(books));
      main.appendChild(secTopShared(fin));
      main.appendChild(secKeywords(fin));
      main.appendChild(secBubbles(fin));
      main.appendChild(secAllBooks(books));
      app.appendChild(main);
      setTimeout(loadCovers, 0);
      const tp = fin.reduce((s, b) => s + b.pagesTotales, 0);
      document.getElementById('footerStats').textContent = `${fin.length} livres · ${tp.toLocaleString('fr-FR')} pages · 6 lectrices`;
    }

    // ── STATS ──────────────────────────────
    function secStats(books) {
      const w = sec();
      w.appendChild(slabel('Vue d\'ensemble', '#1a2f5e'));
      const g = mk('div', 'stats-row fade');
      const total = books.length, pages = books.reduce((s, b) => s + b.pagesTotales, 0);
      const rated = books.filter(b => b.note && b.note > 0);
      const avgN = rated.length ? (rated.reduce((s, b) => s + b.note, 0) / rated.length).toFixed(1) : '—';
      const avgP = total ? Math.round(pages / total) : 0;
      const wd = books.filter(b => b.jours > 0 && b.jours < 365);
      const avgJ = wd.length ? (wd.reduce((s, b) => s + b.jours, 0) / wd.length).toFixed(1) : '—';
      [
        { i: '📚', l: 'Livres lus', v: total, u: '', s: 'depuis janvier 2026', dark: true, b: Math.min(100, total) },
        { i: '📄', l: 'Pages lues', v: `${Math.round(pages / 1000)}k`, u: '', s: `${pages.toLocaleString('fr-FR')} pages`, dark: false, b: 0 },
        { i: '⭐', l: 'Note moyenne', v: avgN, u: '/5', s: 'collectif', dark: false, b: rated.length ? (parseFloat(avgN) / 5 * 100) : 0 },
        { i: '📖', l: 'Pages / livre', v: avgP, u: '', s: 'moy. par livre', dark: false, b: Math.min(100, avgP / 5) },
        { i: '🕐', l: 'Jours / livre', v: avgJ, u: '', s: 'lecture rapide 🔥', dark: false, b: Math.min(100, (parseFloat(avgJ) || 0) / 20 * 100) },
      ].forEach(t => {
        const tile = mk('div', `stat-tile${t.dark ? ' dark' : ''}`);
        tile.innerHTML = `<div style="font-size:18px;margin-bottom:5px">${t.i}</div><div class="stl">${t.l}</div><div class="stv">${t.v}<span class="u">${t.u}</span></div><div class="sts">${t.s}</div>${t.b ? `<div class="sbar"><div class="sbar-f" style="width:${t.b}%"></div></div>` : ''}`;
        g.appendChild(tile);
      });
      w.appendChild(g); return w;
    }

    // ── DERNIÈRES LECTURES ─────────────────
    function secDernieres(books) {
      const w = sec();
      w.appendChild(slabel('Dernières lectures', '#e85d3a'));
      const fin = books.filter(b => b.fini);
      // build map: last finished book per reader
      const last = {};
      fin.forEach(b => { last[b.lectrice] = b; });
      const g = mk('div', 'dernieres-grid fade');

      READERS.forEach(r => {
        const b = last[r];
        const col = COLORS[r] || '#999';
        const card = mk('div', 'derniere-card');
        card.style.borderTop = `3px solid ${col}`;
        if (!b) {
          card.innerHTML = `<div class="dc-header"><span class="rtag" style="background:${col}">${EMOJI[r] || ''} ${r}</span></div><div class="dc-empty">Rien encore… 📚</div>`;
        } else {
          const tags = b.motsCles ? b.motsCles.split(',').slice(0, 3).map(t => `<span class="btag">${t.trim()}</span>`).join('') : '';
          card.innerHTML = `
            <div class="dc-header">
              <span class="rtag" style="background:${col}">${EMOJI[r] || ''} ${r}</span>
              ${b.note > 0 ? `<span class="dc-stars" style="color:#f59e0b">★ ${b.note}/5</span>` : ''}
            </div>
            <div class="dc-cover-row">
              <div class="bcover sm js-cover" data-title="${b.titre.replace(/"/g, '&quot;')}" data-author="${b.auteur.replace(/"/g, '&quot;')}" data-emoji="${ge(b.genre)}">${ge(b.genre)}</div>
              <div class="dc-info">
                <div class="dc-title">${b.titre}</div>
                <div class="bauthor">👤 ${b.auteur}</div>
                <div class="dc-meta">
                  ${b.pagesTotales ? `<span>📄 ${b.pagesTotales}p</span>` : ''}
                  ${b.genre ? `<span style="color:${gc(b.genre)}"># ${b.genre}</span>` : ''}
                </div>
              </div>
            </div>
            ${b.avis ? `<div class="breview">« ${b.avis} »</div>` : ''}
            ${tags ? `<div class="btags">${tags}</div>` : ''}
          `;
        }
        g.appendChild(card);
      });

      w.appendChild(g); return w;
    }

    // ── READER CARDS ───────────────────────
    function secReaders(books, goals) {
      const w = sec();
      w.appendChild(slabel('Les Lectrices', '#0891b2'));
      const g = mk('div', 'readers-grid fade');
      const totalBooks = books.length;
      READERS.forEach(r => {
        const rb = books.filter(b => b.lectrice === r);
        const pages = rb.reduce((s, b) => s + b.pagesTotales, 0);
        const rated = rb.filter(b => b.note && b.note > 0);
        const avgN = rated.length ? (rated.reduce((s, b) => s + b.note, 0) / rated.length).toFixed(1) : '—';
        const avgP = rb.length ? Math.round(pages / rb.length) : 0;
        const pctG = totalBooks ? Math.round(rb.length / totalBooks * 100) : 0;
        const col = COLORS[r], goal = goals?.[r] || 100;
        const pctC = Math.min(100, Math.round(rb.length / goal * 100));
        const link = goals?.[r + '_link'] || '#';
        const card = mk('div', 'reader-card');
        card.style.borderTop = `4px solid ${col}`;
        card.innerHTML = `<div class="rc-header"><div class="rc-name" style="color:${col}">${EMOJI[r]} ${r}</div><a href="${link}" target="_blank" class="rc-link" title="Goodreads">↗</a></div><div class="rc-rows"><div class="rc-row"><span>Livres</span><strong>${rb.length}</strong></div><div class="rc-row"><span>Pages</span><strong>${pages.toLocaleString('fr-FR')}</strong></div><div class="rc-row"><span>Note moy.</span><strong style="color:${col}">${avgN}${avgN !== '—' ? ' ★' : ''}</strong></div><div class="rc-row"><span>Pages / livre</span><strong>${avgP}</strong></div></div><div class="rc-progress"><div><div class="prow-label"><span>Part du groupe</span><span>${pctG}%</span></div><div class="pbar"><div class="pbar-f" style="width:${pctG}%;background:${col}"></div></div></div><div><div class="prow-label"><span>🎯 Challenge 2026 · ${rb.length}/${goal}</span><span>${pctC}%</span></div><div class="pbar"><div class="pbar-f" style="width:${pctC}%;background:${col}88"></div></div></div></div>`;
        g.appendChild(card);
      });
      w.appendChild(g); return w;
    }

    // ── GENRE MULTIPLES ────────────────────
    function secGenres(books) {
      const w = sec();
      w.appendChild(slabel('Genres lus par lectrice', '#0891b2'));
      const g = mk('div', 'gm-grid fade');
      READERS.forEach(r => {
        const rb = books.filter(b => b.lectrice === r);
        const counts = {}; rb.forEach(b => { if (b.genre) counts[b.genre] = (counts[b.genre] || 0) + 1; });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const max = sorted[0]?.[1] || 1, col = COLORS[r];
        const col_el = mk('div', 'gm-col');
        const rows = sorted.map(([g, n]) => `<div class="gr-row"><span class="gr-name">${g}</span><div class="gr-bar"><div class="gr-fill" style="width:${Math.round(n / max * 100)}%;background:${gc(g)}"></div></div><span class="gr-n">${n}</span></div>`).join('');
        col_el.innerHTML = `<div class="gm-head" style="border-color:${col}40;color:${col}"><div class="gm-name">${EMOJI[r]} ${r}</div><span class="gm-cnt">${rb.length} livres</span></div>${rows}`;
        g.appendChild(col_el);
      });
      w.appendChild(g); return w;
    }

    // ── ANALYSES ───────────────────────────
    function secAnalyses(books) {
      const w = sec();
      w.appendChild(slabel('Analyses', '#0891b2'));
      const g = mk('div', 'analyses-grid fade');

      // genre donut
      const gc2 = {}; books.forEach(b => { if (b.genre) gc2[b.genre] = (gc2[b.genre] || 0) + 1; });
      g.appendChild(donutCard('Genres littéraires', gc2, books.length, '#0891b2'));

      // auteur donut
      const ga = {}; books.forEach(b => { if (b.genreAuteur) ga[b.genreAuteur] = (ga[b.genreAuteur] || 0) + 1; });
      const gaC = { 'Femme': '#0891b2', 'Homme': '#1a2f5e', 'Mixte': '#e85d3a', 'Non-binaire': '#d4820a', 'Femmes': '#0891b2', 'Hommes': '#1a2f5e' };
      g.appendChild(donutCard('Genre des auteur·ices', ga, books.length, '#059669', gaC));

      // monthly bar
      const byM = {}; MONTHS.forEach(m => byM[m] = 0);
      books.forEach(b => { if (b.mois && byM[b.mois] !== undefined) byM[b.mois]++; });
      const vals = MONTHS.map(m => byM[m]), maxM = Math.max(...vals, 1);
      const bc = mk('div', 'acard');
      bc.innerHTML = `<div class="acard-title"><span style="width:8px;height:8px;border-radius:50%;background:#e85d3a;display:inline-block"></span>Livres par mois</div>`;
      const bw = mk('div', 'monthly-bars');
      MONTHS.forEach((m, i) => {
        const v = vals[i], pct = Math.round(v / maxM * 100);
        const c = mk('div', 'mbc');
        c.innerHTML = `${v > 0 ? `<span class="mb-val">${v}</span>` : '<span class="mb-val" style="opacity:0">0</span>'}<div class="mb-bar" style="height:${Math.max(pct, v > 0 ? 4 : 1)}%;background:${v > 0 ? 'var(--navy)' : 'var(--border)'}"></div><span class="mb-lbl">${MSHORT[i]}</span>`;
        bw.appendChild(c);
      });
      bc.appendChild(bw); g.appendChild(bc);
      w.appendChild(g); return w;
    }

    function donutCard(title, counts, total, dotColor, colorMap) {
      const card = mk('div', 'acard');
      card.innerHTML = `<div class="acard-title"><span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block"></span>${title.toUpperCase()}</div>`;
      const localTotal = Object.values(counts).reduce((s, v) => s + v, 0) || 1;
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 7);
      const r = 38, cx = 50, cy = 50, circ = 2 * Math.PI * r;
      let off = 0;
      const segs = sorted.map(([k, n]) => {
        const pct = n / localTotal, arc = circ * pct;
        const s = { k, n, pct, arc, off, color: (colorMap && colorMap[k]) || gc(k) }; off += arc; return s;
      });
      const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svgEl.setAttribute('width', '86'); svgEl.setAttribute('height', '86'); svgEl.setAttribute('viewBox', '0 0 100 100');
      svgEl.style.transform = 'rotate(-90deg)'; svgEl.style.flexShrink = '0';
      segs.forEach(s => {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
        c.setAttribute('fill', 'none'); c.setAttribute('stroke', s.color); c.setAttribute('stroke-width', '17');
        c.setAttribute('stroke-dasharray', `${s.arc} ${circ - s.arc}`);
        c.setAttribute('stroke-dashoffset', `-${s.off}`);
        svgEl.appendChild(c);
      });
      const leg = mk('div', 'donut-legend');
      const sumUsed = sorted.reduce((s, v) => s + v[1], 0);
      segs.forEach(s => {
        const pct = Math.round(s.n / localTotal * 100);
        leg.innerHTML += `<div class="dl-item"><div class="dl-dot" style="background:${s.color}"></div>${s.k}<span class="dl-pct">${pct}%</span></div>`;
      });
      if (sumUsed < localTotal) {
        const otherPct = Math.round((localTotal - sumUsed) / localTotal * 100);
        leg.innerHTML += `<div class="dl-item"><div class="dl-dot" style="background:#cbd5e1"></div>Autres<span class="dl-pct">${otherPct}%</span></div>`;
      }
      const wrap = mk('div', 'donut-wrap');
      wrap.appendChild(svgEl); wrap.appendChild(leg); card.appendChild(wrap); return card;
    }

    // ── FORMATS ────────────────────────────
    function secFormats(books) {
      const w = sec();
      w.appendChild(slabel('Formats', '#6b7fa8'));
      const counts = {}; books.forEach(b => { if (b.format) counts[b.format] = (counts[b.format] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]), max = sorted[0]?.[1] || 1;
      const card = mk('div', 'fcard fade');
      sorted.forEach(([f, n]) => {
        const row = mk('div', 'hb-row');
        row.innerHTML = `<span class="hb-label">${f}</span><div class="hb-track"><div class="hb-fill" style="width:${Math.round(n / max * 100)}%"></div></div><span class="hb-val">${n}</span>`;
        card.appendChild(row);
      });
      w.appendChild(card); return w;
    }

    // ── TOP + SHARED ───────────────────────
    function secTopShared(books) {
      const w = sec();
      const g = mk('div', 'two-col fade');

      // TOP
      const tp = mk('div', 'panel');
      tp.innerHTML = `<div class="panel-title"><span style="width:8px;height:8px;border-radius:50%;background:#d4820a;display:inline-block"></span>TOP LECTURES NOTÉES</div>`;
      [...books].filter(b => b.note && b.note > 0).sort((a, b) => b.note - a.note).slice(0, 5).forEach((b, i) => {
        const row = mk('div', 'top-row');
        row.innerHTML = `<span class="top-rank">#${i + 1}</span><div class="tcover js-cover" data-title="${b.titre.replace(/"/g, '&quot;')}" data-author="${b.auteur.replace(/"/g, '&quot;')}" data-emoji="${ge(b.genre)}">${ge(b.genre)}</div><div class="top-content"><div class="top-title">${b.titre}</div><div class="top-author">${b.auteur}</div><div style="display:flex;align-items:center;gap:7px;margin-top:3px"><span class="rtag" style="background:${COLORS[b.lectrice] || '#999'};font-size:10px;padding:2px 7px">${b.lectrice}</span><div class="stars">${starsHtml(b.note)}</div></div></div>`;
        tp.appendChild(row);
      });

      // SHARED
      const sp = mk('div', 'panel');
      sp.innerHTML = `<div class="panel-title"><span style="width:8px;height:8px;border-radius:50%;background:#059669;display:inline-block"></span>LECTURES EN COMMUN</div>`;
      const byT = {};
      books.forEach(b => {
        const k = b.titre.toLowerCase().replace(/[^a-zàâéèêëîïôùûü]/g, '').slice(0, 22);
        if (!byT[k]) byT[k] = { titre: b.titre, genre: b.genre, entries: [] }; byT[k].entries.push(b);
      });
      Object.values(byT).filter(g => new Set(g.entries.map(e => e.lectrice)).size >= 2)
        .sort((a, b) => new Set(b.entries.map(e => e.lectrice)).size - new Set(a.entries.map(e => e.lectrice)).size)
        .forEach(g => {
          const byR = {}; g.entries.forEach(e => { if (!byR[e.lectrice]) byR[e.lectrice] = e; });
          const chips = READERS.filter(r => byR[r]).map(r => {
            const e = byR[r], col = COLORS[r];
            const rate = e.note && e.note > 0 ? `<span class="crate" style="color:${col}">★ ${e.note}</span>` : `<span class="cnone">—</span>`;
            return `<div class="sh-chip" style="border-color:${col}30"><span class="cname" style="background:${col}">${EMOJI[r]} ${r}</span>${rate}</div>`;
          }).join('');
          const row = mk('div', 'sh-row');
          const _e = g.entries[0]; row.innerHTML = `<div class="sh-cover js-cover" data-title="${g.titre.replace(/"/g, '&quot;')}" data-author="${(_e?.auteur || '').replace(/"/g, '&quot;')}" data-emoji="${ge(g.genre)}">${ge(g.genre)}</div><div class="sh-content"><div class="sh-title">${g.titre}</div><div class="sh-chips">${chips}</div></div>`;
          sp.appendChild(row);
        });

      g.appendChild(tp); g.appendChild(sp); w.appendChild(g); return w;
    }

    // ── KEYWORDS ───────────────────────────
    function secKeywords(books) {
      const w = sec();
      w.appendChild(slabel('Mots-clés populaires', '#e85d3a'));
      const counts = {};
      books.forEach(b => { if (!b.motsCles) return; b.motsCles.split(',').forEach(k => { const t = k.trim().toLowerCase(); if (t) counts[t] = (counts[t] || 0) + 1; }); });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]), maxC = sorted[0]?.[1] || 1;
      const card = mk('div', 'kcard fade');
      const cloud = mk('div', 'kcloud');
      sorted.forEach(([k, n]) => {
        const tag = mk('span', 'ktag');
        tag.style.fontSize = (11 + Math.round(n / maxC * 5)) + 'px';
        tag.style.opacity = (0.55 + n / maxC * 0.45) + '';
        tag.textContent = `${k} (${n})`;
        cloud.appendChild(tag);
      });
      card.appendChild(cloud); w.appendChild(card); return w;
    }

    // ── BUBBLES ────────────────────────────
    function secBubbles(books) {
      const w = sec();
      w.appendChild(slabel('Pages par livre', '#1a2f5e'));
      const card = mk('div', 'card fade');
      card.style.cssText = 'padding:20px;margin-bottom:0';
      const wrap = mk('div', 'bubble-wrap');
      const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svgEl.classList.add('bubble-svg'); svgEl.setAttribute('height', '260');
      wrap.appendChild(svgEl); card.appendChild(wrap);
      const tip = document.getElementById('tooltip');
      setTimeout(() => {
        const W = wrap.clientWidth - 8, H = 240;
        svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`); svgEl.setAttribute('width', W);
        const allP = books.filter(b => b.pagesTotales > 0).map(b => b.pagesTotales), maxP = Math.max(...allP, 1);
        const rad = p => 3 + Math.pow(Math.max(0, (p - 40)) / (maxP - 40), 0.6) * 39;
        const slotW = W / READERS.length;
        READERS.forEach((r, ri) => {
          const rb = books.filter(b => b.lectrice === r && b.pagesTotales > 0), col = COLORS[r], cx0 = slotW * ri + slotW / 2;
          const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          lbl.setAttribute('x', cx0); lbl.setAttribute('y', H - 2); lbl.setAttribute('text-anchor', 'middle');
          lbl.setAttribute('font-size', '12'); lbl.setAttribute('fill', '#3a4f7a'); lbl.setAttribute('font-family', 'Space Grotesk,sans-serif'); lbl.setAttribute('font-weight', '700'); lbl.textContent = `${EMOJI[r]} ${r}`; svgEl.appendChild(lbl);
          const placed = [];
          [...rb].sort((a, b) => b.pagesTotales - a.pagesTotales).forEach(b => {
            const rr = rad(b.pagesTotales);
            let cx = cx0 + (Math.random() - 0.5) * (slotW * 0.4), cy = (H - 24) / 2 + (Math.random() - 0.5) * ((H - 24) * 0.5);
            const cx_ = () => { cx = Math.max(slotW * ri + rr + 4, Math.min(slotW * (ri + 1) - rr - 4, cx)); };
            const cy_ = () => { cy = Math.max(rr + 4, Math.min(H - 24 - rr, cy)); };
            cx_(); cy_();
            for (let i = 0; i < 60; i++) { placed.forEach(p => { const dx = cx - p.cx, dy = cy - p.cy, d = Math.sqrt(dx * dx + dy * dy), mn = rr + p.r + 4; if (d < mn && d > 0.01) { const push = (mn - d) * 0.55; cx += dx / d * push; cy += dy / d * push; } }); cx_(); cy_(); }
            placed.push({ cx, cy, r: rr });
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', rr); c.setAttribute('fill', col); c.setAttribute('fill-opacity', '0.72'); c.setAttribute('stroke', col); c.setAttribute('stroke-width', '1.5'); c.style.cursor = 'pointer';
            c.addEventListener('mouseenter', () => { tip.style.opacity = 1; tip.innerHTML = `<strong>${b.titre}</strong><br>${b.lectrice} · ${b.pagesTotales}p${b.note && b.note > 0 ? ' · ' + b.note + '★' : ''}`; });
            c.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 40) + 'px'; });
            c.addEventListener('mouseleave', () => { tip.style.opacity = 0; });
            svgEl.appendChild(c);
            if (rr >= 22) { const t = document.createElementNS('http://www.w3.org/2000/svg', 'text'); t.setAttribute('x', cx); t.setAttribute('y', cy + 4); t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '8'); t.setAttribute('fill', '#fff'); t.setAttribute('font-family', 'Space Grotesk,sans-serif'); t.setAttribute('font-weight', '700'); t.setAttribute('pointer-events', 'none'); t.textContent = b.titre.length > 18 ? b.titre.slice(0, 16) + '…' : b.titre; svgEl.appendChild(t); }
          });
        });
      }, 60);
      const leg = mk('div', 'sz-legend');
      leg.innerHTML = `<span>Taille = pages :</span><div class="sz-item"><div class="sz-circle" style="width:9px;height:9px"></div>100p</div><div class="sz-item"><div class="sz-circle" style="width:20px;height:20px"></div>400p</div><div class="sz-item"><div class="sz-circle" style="width:34px;height:34px"></div>700p</div>`;
      card.appendChild(leg); w.appendChild(card); return w;
    }

    // ── ALL BOOKS ──────────────────────────
    function secAllBooks(books) {
      const w = sec();
      w.appendChild(slabel('Toutes les lectures 2026', '#1a2f5e'));
      const card = mk('div', 'card fade');
      card.style.padding = '20px';
      const fin = books.filter(b => b.fini);
      let activeF = 'Toutes';

      const header = mk('div', 'ab-header');
      const tabs = mk('div', 'filter-tabs');
      ['Toutes', ...READERS].forEach(r => {
        const tab = mk('div', `ftab${r === 'Toutes' ? ' active' : ''}`);
        if (r !== 'Toutes') tab.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${COLORS[r]};display:inline-block"></span>${r}`;
        else tab.textContent = 'Toutes';
        tab.addEventListener('click', () => {
          tabs.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active'); activeF = r; renderBList();
        });
        tabs.appendChild(tab);
      });
      header.appendChild(tabs); card.appendChild(header);

      const listEl = mk('div', 'blist');
      card.appendChild(listEl);
      const countEl = mk('div', 'blist-count');
      card.appendChild(countEl);

      function renderBList() {
        listEl.innerHTML = '';
        const filtered = activeF === 'Toutes' ? fin : fin.filter(b => b.lectrice === activeF);
        filtered.forEach(b => {
          const col = COLORS[b.lectrice] || '#999';
          const row = mk('div', 'brow');
          row.innerHTML = `<div class="bstripe" style="background:${col}"></div><div class="brow-inner"><div class="brow-cover js-cover" data-title="${b.titre.replace(/"/g, '&quot;')}" data-author="${b.auteur.replace(/"/g, '&quot;')}" data-emoji="${ge(b.genre)}">${ge(b.genre)}</div><div class="brow-content"><div class="brow-title">${b.titre}</div><div class="brow-meta">${b.auteur}${b.pagesTotales ? ' · ' + b.pagesTotales + 'p' : ''}<span class="gtext">${b.genre ? ' · # ' + b.genre : ''}</span></div>${b.avis ? `<div class="brow-review">« ${b.avis} »</div>` : ''}</div><div class="brow-right">${b.note && b.note > 0 ? `<span class="bstar">★ ${b.note}</span>` : ''}${b.mois ? `<span class="mbadge">${b.mois.slice(0, 3)}</span>` : ''}</div></div>`;
          listEl.appendChild(row);
        });
        countEl.textContent = `${filtered.length} lecture${filtered.length > 1 ? 's' : ''}`;
        setTimeout(loadCovers, 0);
      }
      renderBList();
      w.appendChild(card); return w;
    }

    // ── HELPERS ────────────────────────────
    function mk(tag, cls = '') { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
    function sec() { const d = mk('div', 'sec'); return d; }
    function slabel(text, dotColor) { const d = mk('div', 'section-label'); d.innerHTML = `<span class="sdot" style="background:${dotColor}"></span>${text.toUpperCase()}`; return d; }
    function starsHtml(n) { let s = ''; const f = Math.floor(n), h = n % 1 >= 0.5; for (let i = 0; i < f; i++)s += '<span>★</span>'; if (h) s += '<span style="font-size:10px">½</span>'; return s; }

    // ── GOOGLE BOOKS COVERS ────────────────
    const _coverCache = new Map();
    async function fetchCover(titre, auteur) {
      const key = titre + '|' + auteur;
      if (_coverCache.has(key)) return _coverCache.get(key);
      try {
        const q = encodeURIComponent('intitle:' + titre + (auteur ? ' inauthor:' + auteur : ''));
        const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1&fields=items/volumeInfo/imageLinks&langRestrict=fr`);
        if (!r.ok) { _coverCache.set(key, null); return null; }
        const d = await r.json();
        const links = d?.items?.[0]?.volumeInfo?.imageLinks;
        const url = (links?.thumbnail || links?.smallThumbnail || null)?.replace(/^http:/, 'https:') || null;
        _coverCache.set(key, url);
        return url;
      } catch { _coverCache.set(key, null); return null; }
    }

    function loadCovers() {
      document.querySelectorAll('.js-cover[data-title]').forEach(async el => {
        if (el.dataset.loaded) return;
        el.dataset.loaded = '1';
        const url = await fetchCover(el.dataset.title, el.dataset.author || '');
        if (!url) return;
        const img = document.createElement('img');
        img.src = url;
        img.alt = el.dataset.title;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:5px;display:block';
        img.onerror = () => { el.innerHTML = el.dataset.emoji || '📚'; img.remove(); };
        el.innerHTML = '';
        el.style.background = 'transparent';
        el.style.border = 'none';
        el.style.padding = '0';
        el.style.overflow = 'hidden';
        el.appendChild(img);
      });
    }

    function setupGuide() { return `<div style="background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:32px;font-family:'Nunito',sans-serif;line-height:1.8"><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px">📋 Guide d'installation</div><ol style="padding-left:20px;display:flex;flex-direction:column;gap:14px;color:var(--text-mid);font-size:14px"><li>Google Sheets → <em>Extensions</em> → <em>Apps Script</em></li><li>Collez le contenu du fichier <code>Code.gs</code> fourni</li><li>Vérifiez <code>getSheetByName("2026")</code> et <code>getSheetByName("Listes")</code></li><li><strong>Déployer</strong> → Nouveau déploiement → Application Web → Accès : <em>Tout le monde</em></li><li>Copiez l'URL et remplacez <code>PASTE_YOUR_APPS_SCRIPT_URL_HERE</code> dans ce fichier</li></ol></div>`; }

    loadData();
  </script>
