<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lectures de la Dream Team 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4fa;--white:#fff;--border:#dde4f0;
  --navy:#1a2f5e;--navy-mid:#2a4480;--navy-pale:#e4ebf8;
  --teal:#0891b2;--teal-light:#22d3ee;
  --coral:#e85d3a;--gold:#d4820a;--mint:#059669;
  --text:#0f1e3d;--text-mid:#3a4f7a;--text-light:#6b7fa8;
  --shadow:rgba(26,47,94,0.09);
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh}

/* HEADER */
.site-header{background:linear-gradient(115deg,#0f1e3d 0%,#1a2f5e 30%,#2d2a6e 60%,#7b3a5a 85%,#c4512e 100%);color:#fff;padding:0 48px;display:grid;grid-template-columns:1fr auto;align-items:center;min-height:100px;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(196,81,46,0.2) 0%,transparent 70%);top:-80px;right:60px;pointer-events:none}
.site-header::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(123,58,90,0.25) 0%,transparent 70%);bottom:-60px;right:320px;pointer-events:none}
.header-left h1{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1;color:#fff;position:relative;z-index:1}
.header-left h1 em{font-style:italic}
.header-left p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-top:7px;font-weight:500;position:relative;z-index:1}
.header-right{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.update-tag{font-size:11px;color:rgba(255,255,255,0.4)}
.btn-refresh{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.25);padding:10px 22px;border-radius:24px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background 0.2s,transform 0.1s}
.btn-refresh:hover{background:rgba(255,255,255,0.25);transform:translateY(-1px)}
.btn-refresh.loading{opacity:0.6;pointer-events:none}

/* LAYOUT */
main{padding:32px 48px;max-width:1140px;margin:0 auto}
.sec{margin-bottom:32px}
.section-label{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--text-light);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-label .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 6px var(--shadow)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat-tile{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 18px 14px;box-shadow:0 1px 6px var(--shadow)}
.stat-tile.dark{background:linear-gradient(135deg,#1a2f5e,#2d2a6e);border-color:transparent}
.stl{font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-light);font-weight:600;margin-bottom:4px}
.stat-tile.dark .stl{color:rgba(255,255,255,0.5)}
.stv{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;line-height:1;letter-spacing:-1.5px;color:var(--text)}
.stat-tile.dark .stv{color:#fff}
.stv .u{font-size:13px;font-weight:500;opacity:0.45;letter-spacing:0}
.sts{font-size:11px;color:var(--text-light);margin-top:4px;font-weight:600}
.stat-tile.dark .sts{color:rgba(255,255,255,0.4)}
.sbar{height:3px;border-radius:99px;overflow:hidden;margin-top:10px;background:rgba(255,255,255,0.15)}
.sbar-f{height:100%;border-radius:99px;background:var(--teal-light)}
.stat-tile:not(.dark) .sbar{background:var(--border)}

/* DERNIÈRES LECTURES */
.dernieres-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.featured-book{grid-column:1/3;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:0 1px 6px var(--shadow);display:flex;gap:18px}
.bcover{width:76px;height:106px;border-radius:6px;background:var(--navy-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.bcover.sm{width:48px;height:66px;font-size:20px}
.rtag{display:inline-block;padding:3px 9px;border-radius:99px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#fff;margin-bottom:8px}
.btitle-lg{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bauthor{font-size:12px;color:var(--text-light);font-weight:600;margin-bottom:7px}
.bmeta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-mid);font-weight:600;margin-bottom:10px;flex-wrap:wrap}
.breview{font-size:12px;color:var(--text-mid);line-height:1.6;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.btags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.btag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg);color:var(--text-mid);border:1px solid var(--border)}
.mini-book{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 1px 6px var(--shadow);display:flex;gap:10px}
.mini-content{flex:1;min-width:0}
.mini-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;margin-top:5px}
.mini-author{font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:4px}
.mini-meta{font-size:11px;color:var(--text-mid);font-weight:600}

/* READER CARDS */
.readers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.reader-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:0 1px 6px var(--shadow)}
.rc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rc-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.rc-link{font-size:12px;color:var(--text-light);text-decoration:none;opacity:0.5}
.rc-link:hover{opacity:1}
.rc-rows{display:flex;flex-direction:column}
.rc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-light);font-weight:600;padding:6px 0;border-bottom:1px solid var(--border)}
.rc-row:last-child{border-bottom:none}
.rc-row strong{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.rc-progress{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.prow-label{display:flex;justify-content:space-between;font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:600;margin-bottom:4px}
.pbar{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;border-radius:99px}

/* GENRE MULTIPLES */
.gm-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--white);box-shadow:0 1px 6px var(--shadow)}
.gm-col{padding:18px;border-right:1px solid var(--border)}
.gm-col:last-child{border-right:none}
.gm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid}
.gm-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.gm-cnt{font-size:11px;color:var(--text-light);font-weight:600}
.gr-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.gr-name{font-size:11px;font-weight:700;color:var(--text-mid);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gr-bar{flex:2;height:8px;background:var(--bg);border-radius:99px;overflow:hidden}
.gr-fill{height:100%;border-radius:99px}
.gr-n{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text);min-width:14px;text-align:right}

/* ANALYSES */
.analyses-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.acard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 6px var(--shadow)}
.acard-title{font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--text-mid)}
.dl-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.dl-pct{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text)}
.monthly-bars{display:flex;align-items:flex-end;gap:4px;height:110px;margin-top:8px}
.mbc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.mb-bar{width:100%;border-radius:3px 3px 0 0;background:var(--navy);min-height:2px}
.mb-lbl{font-size:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--text-light);text-transform:uppercase}
.mb-val{font-size:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--text-mid)}

/* FORMATS */
.fcard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 6px var(--shadow)}
.hb-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hb-row:last-child{margin-bottom:0}
.hb-label{font-size:12px;font-weight:700;color:var(--text-mid);width:90px;text-align:right;flex-shrink:0}
.hb-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden}
.hb-fill{height:100%;background:var(--navy);border-radius:4px}
.hb-val{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text);min-width:22px}

/* TOP + SHARED */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 6px var(--shadow)}
.panel-title{font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.top-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.top-row:last-child{border-bottom:none}
.top-rank{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text-light);width:22px;flex-shrink:0}
.tcover{width:34px;height:46px;border-radius:4px;background:var(--navy-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.top-content{flex:1;min-width:0}
.top-title{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-author{font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:3px}
.stars span{color:#f59e0b;font-size:12px}

.sh-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.sh-row:last-child{border-bottom:none}
.sh-cover{width:34px;height:46px;border-radius:4px;background:var(--navy-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sh-content{flex:1;min-width:0}
.sh-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-chips{display:flex;flex-wrap:wrap;gap:4px}
.sh-chip{display:inline-flex;align-items:center;border-radius:99px;overflow:hidden;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;border:1.5px solid transparent}
.cname{padding:3px 6px 3px 5px;color:#fff;display:flex;align-items:center;gap:3px}
.crate{padding:3px 6px;background:#fff}
.cnone{padding:3px 6px;background:#fff;color:var(--text-light);font-style:italic}

/* KEYWORDS */
.kcard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 6px var(--shadow)}
.kcloud{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.ktag{font-weight:700;padding:4px 11px;border-radius:99px;background:#fde8e0;color:#c4512e;cursor:default;transition:opacity 0.15s}
.ktag:hover{opacity:0.7}

/* BUBBLES */
.bubble-wrap{position:relative}
.bubble-svg{width:100%;overflow:visible;display:block}
.sz-legend{display:flex;align-items:center;gap:18px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--text-light)}
.sz-item{display:flex;align-items:center;gap:6px}
.sz-circle{border-radius:50%;background:var(--navy-pale);border:1.5px solid #3d5fa0;flex-shrink:0}

/* ALL BOOKS */
.ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap}
.ftab{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);color:var(--text-mid);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.ftab.active{background:var(--navy);border-color:var(--navy);color:#fff}
.ftab:hover:not(.active){border-color:var(--navy);color:var(--navy)}
.blist{display:flex;flex-direction:column}
.brow{display:flex;align-items:center;gap:0;padding:11px 0;border-bottom:1px solid var(--border);position:relative}
.brow:last-child{border-bottom:none}
.bstripe{width:3px;align-self:stretch;border-radius:99px;margin-right:12px;flex-shrink:0}
.brow-inner{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.brow-cover{width:38px;height:52px;border-radius:4px;background:var(--navy-pale);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brow-content{flex:1;min-width:0}
.brow-title{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow-meta{font-size:11px;color:var(--text-light);font-weight:600;margin-top:1px}
.brow-meta .gtext{color:var(--teal)}
.brow-review{font-size:11px;color:var(--text-mid);font-style:italic;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
.brow-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.mbadge{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);background:var(--bg);border:1px solid var(--border);padding:2px 9px;border-radius:99px}
.bstar{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:#f59e0b}
.blist-count{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--text-light);text-align:center;padding:10px 0}

/* TOOLTIP */
.tooltip{position:fixed;background:var(--navy);color:#fff;padding:8px 12px;border-radius:8px;font-size:11px;font-family:'Space Grotesk',sans-serif;pointer-events:none;opacity:0;transition:opacity 0.15s;max-width:220px;line-height:1.6;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2)}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;font-family:'Space Grotesk',sans-serif;color:var(--text-light)}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--navy-mid);animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff1ee;border:1.5px solid #fca5a5;border-radius:12px;padding:24px 32px;max-width:580px;margin:40px auto;font-family:'Space Grotesk',sans-serif}
.error-box h3{color:var(--coral);margin-bottom:8px}
.error-box p{color:var(--text-mid);font-size:13px;line-height:1.6}
.error-box code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.4s ease both}

footer{border-top:1px solid var(--border);padding:16px 48px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;font-weight:600;max-width:1140px;margin:0 auto}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <h1>Lectures de la <em>Dream Team</em></h1>
    <p>Bilan des lectures · 2026</p>
  </div>
  <div class="header-right">
    <span class="update-tag" id="updateTag">Chargement…</span>
    <button class="btn-refresh" id="refreshBtn" onclick="loadData()">↻ Actualiser</button>
  </div>
</header>

<div id="tooltip" class="tooltip"></div>
<div id="app"></div>

<footer>
  <span>Dream Team Reads <span style="color:var(--navy-mid);font-weight:700">2026</span></span>
  <span id="footerStats"></span>
</footer>

<script>
// ─────────────────────────────
// ⚠️ REMPLACEZ PAR VOTRE URL
// ─────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztvz-9q7dHG5ZoVv0DrULCQrLvKEbAHzbsEeCsW58HHVTEvtISDEdyaekRQXG_NoB6/exec';

const READERS = ['Emiline','Laura M','Laura V','Zoé'];
const COLORS  = {'Emiline':'#e6b31a','Zoé':'#9970c2','Laura V':'#45a17a','Laura M':'#3968c6'};
const EMOJI   = {'Emiline':'🌸','Zoé':'✨','Laura V':'🌿','Laura M':'📖'};
const MONTHS  = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MSHORT  = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

const GC = {'BD':'#1a2f5e','Roman graphique':'#2a4480','Manga':'#1e40af','Romance':'#e85d3a','Romantasy':'#d4820a','(Auto-)biographie':'#0891b2','Littérature contemporaine':'#0e7490','Fantasy':'#059669','Jeunesse':'#7c3aed','Essai':'#6b7fa8','Nouvelles':'#94a3b8','Thriller':'#c4512e','Littérature historique':'#78716c','Webtoon':'#db2777','SF':'#2563eb'};
const GE = {'BD':'📕','Roman graphique':'📗','Romance':'💕','Romantasy':'🐉','(Auto-)biographie':'📔','Fantasy':'⚔️','Jeunesse':'🌟','Essai':'📝','Nouvelles':'📄','Thriller':'🔪','Littérature contemporaine':'📖','Manga':'🎌'};
const gc = g => GC[g]||'#94a3b8';
const ge = g => GE[g]||'📚';

async function loadData() {
  const app=document.getElementById('app'),btn=document.getElementById('refreshBtn'),tag=document.getElementById('updateTag');
  btn.classList.add('loading');btn.textContent='↻ Chargement…';
  app.innerHTML='<div class="loading-screen"><div class="spinner"></div><p>Chargement des données…</p></div>';

  if(SCRIPT_URL==='PASTE_YOUR_APPS_SCRIPT_URL_HERE'){
    app.innerHTML=`<div style="padding:32px 48px;max-width:1140px;margin:0 auto">${setupGuide()}</div>`;
    btn.classList.remove('loading');btn.textContent='↻ Actualiser';return;
  }
  try{
    const res=await fetch(SCRIPT_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const json=await res.json();
    render(json.books,json.goals,json.generated);
    const d=new Date(json.generated);
    tag.textContent=`Mis à jour ${d.toLocaleDateString('fr-BE')} · ${d.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){

// ── STATS ──────────────────────────────
function secStats(books){
  const w=sec();

  const total=books.length,pages=books.reduce((s,b)=>s+b.pagesTotales,0);

function donutCard(title,counts,total,dotColor,colorMap){
  const card=mk('div','acard');
  card.innerHTML=`<div class="acard-title"><span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block"></span>${title.toUpperCase()}</div>`;
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const r=38,cx=50,cy=50,circ=2*Math.PI*r;
  let off=0;
  const segs=sorted.map(([k,n])=>{
    const pct=n/total,arc=circ*pct;
    const s={k,n,pct,arc,off,color:(colorMap&&colorMap[k])||gc(k)};off+=arc;return s;
  });
  const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('width','86');svgEl.setAttribute('height','86');svgEl.setAttribute('viewBox','0 0 100 100');
  svgEl.style.transform='rotate(-90deg)';svgEl.style.flexShrink='0';
  segs.forEach(s=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
    c.setAttribute('fill','none');c.setAttribute('stroke',s.color);c.setAttribute('stroke-width','17');
    c.setAttribute('stroke-dasharray',`${s.arc} ${circ-s.arc}`);
    c.setAttribute('stroke-dashoffset',`-${s.off}`);
    svgEl.appendChild(c);
  });
  const leg=mk('div','donut-legend');
  segs.forEach(s=>{
    const pct=Math.round(s.n/total*100);
    leg.innerHTML+=`<div class="dl-item"><div class="dl-dot" style="background:${s.color}"></div>${s.k}<span class="dl-pct">${pct}%</span></div>`;
  });
  const wrap=mk('div','donut-wrap');
  wrap.appendChild(svgEl);wrap.appendChild(leg);card.appendChild(wrap);return card;
}

// ── BUBBLES ────────────────────────────
function secBubbles(books){
  const w=sec();
  w.appendChild(slabel('Pages par livre','#1a2f5e'));
  const card=mk('div','card fade');
  card.style.cssText='padding:20px;margin-bottom:0';
  const wrap=mk('div','bubble-wrap');
  const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.classList.add('bubble-svg');svgEl.setAttribute('height','260');
  wrap.appendChild(svgEl);card.appendChild(wrap);
  const tip=document.getElementById('tooltip');
  setTimeout(()=>{
    const W=wrap.clientWidth-8,H=240;
    svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);svgEl.setAttribute('width',W);
    const allP=books.filter(b=>b.pagesTotales>0).map(b=>b.pagesTotales),maxP=Math.max(...allP,1);
    const rad=p=>3+Math.pow(Math.max(0,(p-40))/(maxP-40),0.6)*39;
    const slotW=W/READERS.length;
    READERS.forEach((r,ri)=>{
      const rb=books.filter(b=>b.lectrice===r&&b.pagesTotales>0),col=COLORS[r],cx0=slotW*ri+slotW/2;
      const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x',cx0);lbl.setAttribute('y',H-2);lbl.setAttribute('text-anchor','middle');
      lbl.setAttribute('font-size','12');lbl.setAttribute('fill','#3a4f7a');lbl.setAttribute('font-family','Space Grotesk,sans-serif');lbl.setAttribute('font-weight','700');lbl.textContent=`${EMOJI[r]} ${r}`;svgEl.appendChild(lbl);
      const placed=[];
      [...rb].sort((a,b)=>b.pagesTotales-a.pagesTotales).forEach(b=>{
        const rr=rad(b.pagesTotales);
        let cx=cx0+(Math.random()-0.5)*(slotW*0.4),cy=(H-24)/2+(Math.random()-0.5)*((H-24)*0.5);
        const cx_=()=>{cx=Math.max(slotW*ri+rr+4,Math.min(slotW*(ri+1)-rr-4,cx));};
        const cy_=()=>{cy=Math.max(rr+4,Math.min(H-24-rr,cy));};
        cx_();cy_();
        for(let i=0;i<60;i++){placed.forEach(p=>{const dx=cx-p.cx,dy=cy-p.cy,d=Math.sqrt(dx*dx+dy*dy),mn=rr+p.r+4;if(d<mn&&d>0.01){const push=(mn-d)*0.55;cx+=dx/d*push;cy+=dy/d*push;}});cx_();cy_();}
        placed.push({cx,cy,r:rr});
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',rr);c.setAttribute('fill',col);c.setAttribute('fill-opacity','0.72');c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.5');c.style.cursor='pointer';
        c.addEventListener('mouseenter',()=>{tip.style.opacity=1;tip.innerHTML=`<strong>${b.titre}</strong><br>${b.lectrice} · ${b.pagesTotales}p${b.note&&b.note>0?' · '+b.note+'★':''}`;});
        c.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-40)+'px';});
        c.addEventListener('mouseleave',()=>{tip.style.opacity=0;});
        svgEl.appendChild(c);
        if(rr>=22){const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','8');t.setAttribute('fill','#fff');t.setAttribute('font-family','Space Grotesk,sans-serif');t.setAttribute('font-weight','700');t.setAttribute('pointer-events','none');t.textContent=b.titre.length>18?b.titre.slice(0,16)+'…':b.titre;svgEl.appendChild(t);}
      });
    });
  },60);
  const leg=mk('div','sz-legend');
  leg.innerHTML=`<span>Taille = pages :</span><div class="sz-item"><div class="sz-circle" style="width:9px;height:9px"></div>100p</div><div class="sz-item"><div class="sz-circle" style="width:20px;height:20px"></div>400p</div><div class="sz-item"><div class="sz-circle" style="width:34px;height:34px"></div>700p</div>`;
  card.appendChild(leg);w.appendChild(card);return w;
}

      const col=COLORS[b.lectrice]||'#999';
      const row=mk('div','brow');
      row.innerHTML=`<div class="bstripe" style="background:${col}"></div><div class="brow-inner"><div class="brow-cover">${ge(b.genre)}</div><div class="brow-content"><div class="brow-title">${b.titre}</div><div class="brow-meta">${b.auteur}${b.pagesTotales?' · '+b.pagesTotales+'p':''}<span class="gtext">${b.genre?' · # '+b.genre:''}</span></div>${b.avis?`<div class="brow-review">« ${b.avis} »</div>`:''}</div><div class="brow-right">${b.note&&b.note>0?`<span class="bstar">★ ${b.note}</span>`:''}${b.mois?`<span class="mbadge">${b.mois.slice(0,3)}</span>`:''}</div></div>`;
      listEl.appendChild(row);
    });
    countEl.textContent=`${filtered.length} lecture${filtered.length>1?'s':''}`;
  }
  renderBList();
  w.appendChild(card);return w;
}

// ── HELPERS ────────────────────────────
function mk(tag,cls=''){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function sec(){const d=mk('div','sec');return d;}
function slabel(text,dotColor){const d=mk('div','section-label');d.innerHTML=`<span class="sdot" style="background:${dotColor}"></span>${text.toUpperCase()}`;return d;}
function starsHtml(n){let s='';const f=Math.floor(n),h=n%1>=0.5;for(let i=0;i<f;i++)s+='<span>★</span>';if(h)s+='<span style="font-size:10px">½</span>';return s;}

function setupGuide(){return `<div style="background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:32px;font-family:'Nunito',sans-serif;line-height:1.8"><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px">📋 Guide d'installation</div><ol style="padding-left:20px;display:flex;flex-direction:column;gap:14px;color:var(--text-mid);font-size:14px"><li>Google Sheets → <em>Extensions</em> → <em>Apps Script</em></li><li>Collez le contenu du fichier <code>Code.gs</code> fourni</li><li>Vérifiez <code>getSheetByName("2026")</code> et <code>getSheetByName("Listes")</code></li><li><strong>Déployer</strong> → Nouveau déploiement → Application Web → Accès : <em>Tout le monde</em></li><li>Copiez l'URL et remplacez <code>PASTE_YOUR_APPS_SCRIPT_URL_HERE</code> dans ce fichier</li></ol></div>`;}

loadData();
</script>
